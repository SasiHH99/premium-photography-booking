<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Galerie Login | B. Photography</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/gallery-login.css">
</head>
<body class="gallery-login-page" data-gallery-login data-lang="de">
  <div id="site-header"></div>

  <main class="gallery-login-shell">
    <section class="gallery-login-grid">
      <article class="gallery-login-hero">
        <a class="gallery-login-home" id="galleryLoginHome" href="/de/index.html"></a>
        <div>
          <p class="gallery-login-kicker">B. Photography</p>
          <h1 id="galleryLoginHeroTitle"></h1>
          <p id="galleryLoginHeroCopy"></p>
        </div>
      </article>

      <section class="gallery-login-card">
        <p class="gallery-login-kicker">Private Kundenzone</p>
        <h2 id="galleryLoginTitle"></h2>
        <p id="galleryLoginCopy"></p>

        <div class="gallery-login-form">
          <label class="gallery-login-field">
            <span id="galleryLoginEmailLabel"></span>
            <input type="email" id="email" autocomplete="username" required>
          </label>

          <label class="gallery-login-field">
            <span id="galleryLoginPasswordLabel"></span>
            <input type="password" id="password" autocomplete="current-password" required>
          </label>

          <button type="button" class="gallery-login-btn" id="loginBtn"></button>
          <button type="button" class="gallery-login-link-btn" id="galleryForgotBtn"></button>
          <div class="gallery-login-success" id="galleryLoginSuccess"></div>
          <div class="gallery-login-error" id="galleryLoginError"></div>
        </div>

        <p class="gallery-login-note" id="galleryLoginNote"></p>
      </section>
    </section>
  </main>

  <div class="gallery-modal" id="galleryForgotModal" hidden>
    <div class="gallery-modal-backdrop" data-gallery-modal-close></div>
    <section class="gallery-modal-card" role="dialog" aria-modal="true" aria-labelledby="galleryForgotModalTitle">
      <button type="button" class="gallery-modal-close" id="galleryForgotClose" aria-label="Schließen">×</button>
      <p class="gallery-login-kicker" id="galleryForgotModalKicker"></p>
      <h2 id="galleryForgotModalTitle"></h2>
      <p id="galleryForgotModalCopy"></p>
      <label class="gallery-login-field">
        <span id="galleryForgotEmailLabel"></span>
        <input type="email" id="galleryForgotEmail" autocomplete="email">
      </label>
      <button type="button" class="gallery-login-btn" id="galleryForgotSubmit"></button>
      <div class="gallery-login-success" id="galleryForgotSuccess"></div>
      <div class="gallery-login-error" id="galleryForgotError"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/global.js"></script>
  <script src="../js/gallery-login.js"></script>
</body>
</html>
