<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="192x192" href="/images/pwa/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/images/pwa/icon-512.png">
  <link rel="apple-touch-icon" href="/images/pwa/apple-touch-icon.png">
  <title>Confirm Newsletter Signup | B. Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/newsletter.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="newsletter-confirm-page">
    <section class="newsletter-confirm-shell" data-newsletter-confirm data-lang="en">
      <div class="newsletter-confirm-status is-loading" data-confirm-status aria-hidden="true">…</div>
      <p class="newsletter-confirm-eyebrow" data-confirm-eyebrow>Newsletter confirmation</p>
      <h1 data-confirm-title>Confirming your signup...</h1>
      <p data-confirm-text>One moment. I am checking your confirmation link right now.</p>
      <p class="newsletter-confirm-note" data-confirm-note>You will only receive selected updates about available dates, new series, and limited shooting opportunities.</p>
      <div class="newsletter-confirm-actions">
        <a href="/en/index.html" class="btn-primary" data-confirm-primary>Back to homepage</a>
        <a href="/en/contact.html" class="btn-secondary" data-confirm-secondary>Contact me</a>
      </div>
    </section>
  </main>

  <script src="../js/header.js"></script>
  <script src="../js/global.js"></script>
  <script src="../js/newsletter-confirm.js"></script>
</body>
</html>
